name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install development checks
        run: uv sync --only-group dev --locked
      - name: Check for Python correctness errors
        run: .venv/bin/ruff check --select E9,F63,F7,F82 .
      - name: Check whitespace errors
        run: git diff --check

  build-and-smoke:
    # Proves the package builds and is usable WITHOUT torch: `pip install prefscope`
    # then `prefscope --help` must work (heavy imports are deferred into handlers).
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Build wheel + sdist
        run: uv build
      - name: Clean-env install (core deps only, no torch)
        run: |
          uv venv /tmp/clean --python 3.12
          uv pip install --python /tmp/clean/bin/python dist/*.whl
      - name: import + torch-free CLI smoke
        run: |
          /tmp/clean/bin/python -c "import prefscope; print(prefscope.__name__)"
          /tmp/clean/bin/python -c "import importlib.util; assert importlib.util.find_spec('torch') is None, 'torch should NOT be installed'"
          /tmp/clean/bin/prefscope --help

  tests:
    # The package metadata promises Python >=3.10, so exercise every supported minor.
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Sync project (CPU torch + tested cluster backend + dev deps)
        run: uv sync --locked --python ${{ matrix.python-version }} --extra cpu --extra cluster --group dev
      - name: Run tests (skip slow/live)
        run: .venv/bin/python -m pytest -m "not slow" -q
